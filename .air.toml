root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main.exe ."

# This is what Air runs
bin = "tmp/main.exe"

# Tell Air NOT to use Windows "start"
# This forces direct execution
entrypoint = "cmd"

# File types to watch
include_ext = ["go", "tpl", "tmpl", "html"]

# Folders to ignore
exclude_dir = ["assets", "tmp", "vendor", "frontend/node_modules"]

delay = 1000
stop_on_error = true
log = "air_errors.log"

[log]
time = false

[misc]
clean_on_exit = true
